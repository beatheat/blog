{{ define "main" }}
<main id="main-content" class="container portal-shell list-layout">
  <aside class="portal-left">
    <section class="portal-panel">
      <p class="kicker">DIRECTORY</p>
      <h2>Browse</h2>
      {{ partial "sidebar-search-form.html" . }}
      {{ partial "sidebar-nav-links.html" . }}
    </section>
  </aside>

  <section class="portal-center">
    <section class="list-header portal-panel">
      <p class="kicker">DIRECTORY</p>
      <h1>{{ .Title }}</h1>
      <p class="hero-copy">{{ .Data.Plural | title }} 기준으로 글을 탐색할 수 있습니다.</p>
    </section>

    <section class="taxonomy-grid">
      {{ range .Data.Terms.ByCount }}
      <article class="taxonomy-card">
        <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
        <p>{{ .Count }} posts</p>
      </article>
      {{ end }}
    </section>
  </section>

</main>
{{ end }}
