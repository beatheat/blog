{{ define "main" }}
<main id="main-content" class="container portal-shell list-layout">
  <aside class="portal-left">
    <section class="portal-panel">
      <p class="kicker">DIRECTORY</p>
      <h2>Browse</h2>
      <form class="portal-search-form js-search-form" action="{{ "search/" | relURL }}" method="get" role="search" aria-label="사이드바 검색">
        <input type="search" name="q" placeholder="검색어 입력">
        <button type="submit">검색</button>
      </form>
      <nav class="portal-links">
        <a href="{{ "posts/" | relURL }}">전체 글</a>
        <a href="{{ "categories/" | relURL }}">카테고리</a>
        <a href="{{ "tags/" | relURL }}">태그</a>
      </nav>
    </section>
  </aside>

  <section class="portal-center">
    <section class="list-header portal-panel">
      <p class="kicker">DIRECTORY</p>
      <h1>{{ .Title }}</h1>
      <p class="hero-copy">{{ .Data.Plural | title }} 기준으로 글을 탐색할 수 있습니다.</p>
    </section>

    <section class="taxonomy-grid">
      {{ range .Data.Terms.ByCount }}
      <article class="taxonomy-card">
        <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a>
        <p>{{ .Count }} posts</p>
      </article>
      {{ end }}
    </section>
  </section>

</main>
{{ end }}
