<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="{{ "../../images/logo.png" | relURL }}">
  {{ partial "seo.html" . }}
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  {{ with .OutputFormats.Get "RSS" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .RelPermalink }}">
  {{ end }}
</head>
<body data-site-root="{{ "" | relURL }}">
  <a class="skip-link" href="#main-content">본문으로 건너뛰기</a>
  <header class="site-header container">
    <a class="brand" href="{{ "" | relURL }}">{{ .Site.Title }}</a>
    <div class="site-header-right">
      <nav aria-label="주요 메뉴">
        <a href="{{ "posts/" | relURL }}">Posts</a>
        <a href="{{ "tags/" | relURL }}">Tags</a>
        <a href="{{ "categories/" | relURL }}">Categories</a>
        <a href="{{ "who-am-i/" | relURL }}">Who am I</a>
        <a href="https://github.com/beatheat" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
      <div class="theme-selector" aria-label="테마 선택">
        <button class="theme-menu-btn" id="theme-menu-btn" type="button" title="테마 변경">🎨</button>
        <div class="theme-menu" id="theme-menu" hidden>
          <div class="theme-menu-close">
            <button type="button" id="theme-menu-close" title="닫기">✕</button>
          </div>
          <div class="theme-options"></div>
        </div>
      </div>
      <form class="header-search js-search-form" action="{{ "search/" | relURL }}" method="get" role="search" aria-label="사이트 검색">
        <input type="search" name="q" placeholder="검색어 입력" aria-label="검색어 입력">
        <button type="submit">검색</button>
      </form>
    </div>
  </header>

  {{ block "main" . }}{{ end }}

  <footer class="site-footer container">
    <p>© {{ now.Year }} {{ .Site.Title }}</p>
  </footer>
  <script src="{{ "js/theme.js" | relURL }}" defer></script>
  <script src="{{ "js/search.js" | relURL }}" defer></script>
  <script src="{{ "js/view-mode.js" | relURL }}" defer></script>
</body>
</html>
