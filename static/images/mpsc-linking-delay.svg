<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" font-family="Consolas, monospace" font-size="13">
  <defs>
    <marker id="arr-left" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,2.5 L7,0 L7,5 Z" fill="#333"/>
    </marker>
    <marker id="arr-left-red" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,2.5 L7,0 L7,5 Z" fill="#d32f2f"/>
    </marker>
  </defs>
  <style>
    .title { font-size: 18px; font-weight: bold; fill: #222; }
    .subtitle { font-size: 11px; fill: #6b7280; }
    .col-header { font-size: 17px; font-weight: bold; }
    .row-bg { rx: 8; }
    .action { font-size: 12px; fill: #374151; }
    .action-strong { font-size: 12px; font-weight: bold; }
    .thread1 { fill: #1565c0; }
    .thread2 { fill: #e65100; }
    .box { stroke-width: 1.5; rx: 5; }
    .box-text { font-size: 11px; fill: #fff; font-weight: bold; }
    .link-ok { stroke: #333; stroke-width: 2; fill: none; marker-start: url(#arr-left); }
    .link-brk { stroke: #d32f2f; stroke-width: 2; stroke-dasharray: 5,3; fill: none; marker-start: url(#arr-left-red); }
    .label { font-size: 10px; fill: #777; }
    .fail { fill: #d32f2f; font-weight: bold; }
    .ok { fill: #2e7d32; font-weight: bold; }
    .muted { fill: #8a8f98; }
  </style>

  <text x="430" y="28" text-anchor="middle" class="title">MPSC Lock-Free Queue: 링킹 지연 시나리오</text>

  <text x="28" y="74" class="col-header" fill="#1565c0">Thread 1 (Push)</text>
  <text x="250" y="74" class="col-header" fill="#e65100">Thread 2 (Push)</text>
  <text x="520" y="74" class="col-header" fill="#333">Queue</text>
  <line x1="20" y1="84" x2="838" y2="84" stroke="#d7dce2" stroke-width="1"/>

  <rect x="18" y="94" width="824" height="44" fill="#f8fafc" class="row-bg"/>
  <text x="30" y="121" class="muted">-</text>
  <text x="252" y="121" class="muted">-</text>
  <text x="642" y="105" text-anchor="middle" class="label">Head, Tail</text>
  <rect x="606" y="110" width="72" height="22" class="box" fill="#78909c" stroke="#546e7a"/>
  <text x="642" y="125" text-anchor="middle" class="box-text">Sentinel</text>

  <rect x="18" y="148" width="824" height="54" fill="#fff" class="row-bg"/>
  <text x="30" y="181" class="muted">-</text>
  <text x="252" y="172" class="action thread2">Push: Head를</text>
  <text x="252" y="187" class="action thread2">node(1)로 교체</text>
  <text x="597" y="160" text-anchor="middle" class="label">Head</text>
  <rect x="561" y="165" width="72" height="22" class="box" fill="#1565c0" stroke="#0d47a1"/>
  <text x="597" y="180" text-anchor="middle" class="box-text">node(1)</text>
  <line x1="647" y1="176" x2="696" y2="176" class="link-brk"/>
  <text x="672" y="171" text-anchor="middle" class="fail">X</text>
  <rect x="700" y="165" width="72" height="22" class="box" fill="#78909c" stroke="#546e7a"/>
  <text x="736" y="180" text-anchor="middle" class="box-text">Sentinel</text>
  <text x="736" y="160" text-anchor="middle" class="label">Tail</text>

  <rect x="18" y="212" width="824" height="62" fill="#f8fafc" class="row-bg"/>
  <text x="30" y="237" class="action thread1">Push: Head를</text>
  <text x="30" y="252" class="action thread1">node(2)로 교체</text>
  <text x="252" y="244" class="muted">-</text>
  <text x="561" y="224" text-anchor="middle" class="label">Head</text>
  <rect x="525" y="229" width="66" height="22" class="box" fill="#6a1b9a" stroke="#4a148c"/>
  <text x="558" y="244" text-anchor="middle" class="box-text">node(2)</text>
  <line x1="605" y1="240" x2="644" y2="240" class="link-brk"/>
  <text x="624" y="235" text-anchor="middle" class="fail">X</text>
  <rect x="646" y="229" width="66" height="22" class="box" fill="#1565c0" stroke="#0d47a1"/>
  <text x="679" y="244" text-anchor="middle" class="box-text">node(1)</text>
  <line x1="726" y1="240" x2="764" y2="240" class="link-brk"/>
  <text x="745" y="235" text-anchor="middle" class="fail">X</text>
  <rect x="766" y="229" width="58" height="22" class="box" fill="#78909c" stroke="#546e7a"/>
  <text x="795" y="244" text-anchor="middle" class="box-text">Sentinel</text>
  <text x="795" y="224" text-anchor="middle" class="label">Tail</text>
  <text x="678" y="266" text-anchor="middle" class="fail" font-size="11">2군데 끊김!</text>

  <rect x="18" y="284" width="824" height="66" fill="#eaf4ff" class="row-bg"/>
  <text x="30" y="318" class="action thread1">링킹: node(1)._next = node(2)</text>
  <text x="252" y="318" class="action-strong thread1">Thread 1 Push 완료!</text>
  <text x="561" y="296" text-anchor="middle" class="label">Head</text>
  <rect x="525" y="301" width="66" height="22" class="box" fill="#6a1b9a" stroke="#4a148c"/>
  <text x="558" y="316" text-anchor="middle" class="box-text">node(2)</text>
  <line x1="605" y1="312" x2="644" y2="312" class="link-ok"/>
  <rect x="646" y="301" width="66" height="22" class="box" fill="#1565c0" stroke="#0d47a1"/>
  <text x="679" y="316" text-anchor="middle" class="box-text">node(1)</text>
  <line x1="726" y1="312" x2="764" y2="312" class="link-brk"/>
  <text x="745" y="307" text-anchor="middle" class="fail">X</text>
  <rect x="766" y="301" width="58" height="22" class="box" fill="#78909c" stroke="#546e7a"/>
  <text x="795" y="316" text-anchor="middle" class="box-text">Sentinel</text>
  <text x="795" y="296" text-anchor="middle" class="label">Tail</text>
  <text x="677" y="338" text-anchor="middle" class="fail" font-size="11">1군데 끊김</text>

  <rect x="18" y="360" width="824" height="66" fill="#fff4e8" class="row-bg"/>
  <text x="32" y="384" class="fail">Pop: Tail._next == null</text>
  <text x="32" y="400" class="action fail">Thread 1은 Push 완료했지만 실패!</text>
  <text x="31" y="416" class="action" fill="#d32f2f">(Thread 2의 링킹을 기다려야 함)</text>

  <rect x="18" y="436" width="824" height="56" fill="#eefbf3" class="row-bg"/>
  <text x="30" y="470" class="muted">-</text>
  <text x="259" y="469" class="action thread2">링킹: Tail._next = node(1)</text>
  <text x="561" y="448" text-anchor="middle" class="label">Head</text>
  <rect x="525" y="453" width="66" height="22" class="box" fill="#6a1b9a" stroke="#4a148c"/>
  <text x="558" y="468" text-anchor="middle" class="box-text">node(2)</text>
  <line x1="605" y1="464" x2="644" y2="464" class="link-ok"/>
  <rect x="646" y="453" width="66" height="22" class="box" fill="#1565c0" stroke="#0d47a1"/>
  <text x="679" y="468" text-anchor="middle" class="box-text">node(1)</text>
  <line x1="726" y1="464" x2="764" y2="464" class="link-ok"/>
  <rect x="766" y="453" width="58" height="22" class="box" fill="#78909c" stroke="#546e7a"/>
  <text x="795" y="468" text-anchor="middle" class="box-text">Sentinel</text>
  <text x="795" y="448" text-anchor="middle" class="label">Tail</text>

  <rect x="18" y="502" width="824" height="42" fill="#eefbf3" class="row-bg"/>
  <text x="32" y="520" class="action ok">Pop: node(1) 반환 OK</text>
  <text x="32" y="536" class="action ok">Pop: node(2) 반환 OK</text>
</svg>
